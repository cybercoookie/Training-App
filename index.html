<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Running Club - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .completed { border-color: #22c55e !important; background: #064e3b; opacity: 0.7; }
        .tab-active { border-bottom: 3px solid #f97316; color: #f97316; transform: scale(1.05); }
        .admin-mode input { background: #1f2937; border: 1px solid #4b5563; padding: 4px; border-radius: 6px; width: 100%; color: white; margin: 4px 0; }
        ::-webkit-scrollbar { display: none; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); }
        .modal-glass { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-gray-100 font-sans relative min-h-screen">

    <div id="login-view" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-sm bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl text-center">
            <h1 class="text-3xl font-black italic tracking-tighter mb-1">JS <span class="text-orange-500">RUNNING CLUB</span></h1>
            <p class="text-[10px] uppercase tracking-widest font-bold text-gray-500 mb-8">Elite Athlete Portal</p>
            
            <form id="login-form" class="space-y-4 text-left" onsubmit="handleLogin(event)">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase block mb-1 ml-1">Email del Atleta</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                        <input type="email" id="email" required class="w-full bg-black border border-gray-800 rounded-xl py-3 pl-10 pr-4 text-sm focus:border-orange-500 outline-none transition" placeholder="camila@ejemplo.com">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase block mb-1 ml-1">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                        <input type="password" id="password" required class="w-full bg-black border border-gray-800 rounded-xl py-3 pl-10 pr-4 text-sm focus:border-orange-500 outline-none transition" placeholder="••••••••">
                    </div>
                </div>
                
                <p id="login-error" class="text-red-500 text-xs text-center hidden font-bold mt-2">Credenciales incorrectas.</p>
                
                <button type="submit" id="login-btn" class="w-full bg-orange-600 hover:bg-orange-700 p-4 rounded-xl font-black text-white shadow-lg shadow-orange-900/40 transition active:scale-95 mt-6">
                    ENTRAR AL HUB <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="app-view" class="hidden pb-24">
        <header class="p-6 glass sticky top-0 z-40 border-b border-gray-800">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-black italic tracking-tighter">JS <span class="text-orange-500">RUNNING CLUB</span></h1>
                    <div class="flex flex-col text-[9px] uppercase tracking-widest font-bold text-gray-500 mt-1">
                        <span>Atleta: <span id="user-display-name" class="text-white">Cargando...</span></span>
                        <span>Coach: <span class="text-orange-400">J. Santiago</span></span>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="toggleGlossary()" class="bg-gray-900 p-2 rounded-lg border border-gray-800 text-blue-400 hover:text-blue-300 transition">
                        <i class="fas fa-book"></i>
                    </button>
                    <button onclick="handleLogout()" class="bg-gray-900 p-2 rounded-lg border border-gray-800 text-red-500 hover:text-red-400 transition">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="p-4 max-w-md mx-auto space-y-6">
            <section class="bg-gray-900 p-8 rounded-[2rem] border border-gray-800 shadow-2xl text-center">
                <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-4">Cronómetro JS</h2>
                <div id="display" class="text-6xl font-mono font-bold mb-6 text-white tracking-widest drop-shadow-lg">00:00:00</div>
                <div class="flex justify-center gap-6">
                    <button onclick="startStop()" id="startBtn" class="bg-orange-600 w-16 h-16 rounded-full flex items-center justify-center shadow-lg shadow-orange-900/40 active:scale-95 transition">
                        <i class="fas fa-play text-white text-xl"></i>
                    </button>
                    <button onclick="resetTimer()" class="bg-gray-800 w-16 h-16 rounded-full flex items-center justify-center active:scale-95 transition">
                        <i class="fas fa-redo text-gray-400"></i>
                    </button>
                </div>
            </section>

            <div class="flex overflow-x-auto gap-6 border-b border-gray-900 pb-3 no-scrollbar">
                <script>
                    for(let i=1; i<=8; i++) {
                        document.write(`<button onclick="loadWeek(${i}, event)" class="week-tab px-2 py-1 font-black text-xs">${i==8?'🏁':'S'+i}</button>`);
                    }
                </script>
            </div>

            <div id="training-list" class="space-y-4"></div>

            <section class="bg-gray-900 p-6 rounded-3xl border border-gray-800 space-y-4 mt-6">
                <textarea id="coach-notes" placeholder="¿Alguna molestia o nota para el Coach?" 
                          class="w-full bg-black border border-gray-800 rounded-2xl p-4 text-sm focus:border-orange-500 outline-none h-20 transition-all"></textarea>
                
                <button onclick="sendToCoach()" class="w-full bg-green-600 hover:bg-green-700 p-5 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95 transition shadow-lg shadow-green-900/30">
                    <i class="fab fa-whatsapp text-2xl"></i> ENVIAR REPORTE
                </button>
            </section>
        </main>
    </div>

    <div id="glossary-modal" class="hidden fixed inset-0 z-50 modal-glass flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-700 rounded-3xl p-6 max-w-sm w-full shadow-2xl relative">
            <button onclick="toggleGlossary()" class="absolute top-4 right-4 text-gray-400"><i class="fas fa-times text-xl"></i></button>
            <h2 class="text-lg font-black text-orange-500 uppercase italic mb-4 border-b border-gray-800 pb-2"><i class="fas fa-book-open mr-2"></i> Glosario JS</h2>
            <div class="space-y-4 text-sm max-h-[60vh] overflow-y-auto pr-2">
                <div><span class="font-bold text-white">Caco (X:Y):</span> <p class="text-gray-400 text-xs mt-1">Caminar-Correr.</p></div>
                <div><span class="font-bold text-white">Larga / Long Run:</span> <p class="text-gray-400 text-xs mt-1">Entrenamiento clave.</p></div>
            </div>
        </div>
    </div>

    <script>
        // 1. INICIALIZAR SUPABASE
        const supabaseUrl = 'https://ihwzflblfeayyjuaizrx.supabase.co';
        const supabaseKey = 'sb_publishable_jRv8RmKitJkUsSRTmLto9A_nJtuQTI-';
        const supabaseClient = window.supabase ? window.supabase.createClient(supabaseUrl, supabaseKey) : null;

        // 2. LÓGICA DE AUTENTICACIÓN
        async function checkSession() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (session) {
                // Usuario autenticado: Mostrar App, ocultar Login
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                document.getElementById('user-display-name').innerText = session.user.email; // Temporal hasta conectar con la tabla Perfiles
                loadWeek(1); // Cargar rutinas
            } else {
                // No hay sesión: Mostrar Login, ocultar App
                document.getElementById('app-view').classList.add('hidden');
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('login-view').classList.add('flex');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('login-error');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cargando...';
            errorMsg.classList.add('hidden');

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.innerText = "Error: " + error.message;
                errorMsg.classList.remove('hidden');
                btn.innerHTML = 'ENTRAR AL HUB <i class="fas fa-arrow-right ml-2"></i>';
            } else {
                // Login exitoso
                checkSession();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            checkSession();
        }

        // Suscribirse a cambios de estado (por si la sesión expira)
        if(supabaseClient) {
            supabaseClient.auth.onAuthStateChange((event, session) => {
                checkSession();
            });
        }

        // ==========================================
        // LÓGICA DE LA APP (Igual que antes para el MVP)
        // ==========================================
        const defaultPlan = {
            1: [
                { dia: "Lunes", tarea: "Fuerza A", detalle: "Sentadilla/Puente (2x15)" },
                { dia: "Martes", tarea: "2.5 mi Carrera", detalle: "Caco 3:1 Suave" },
                { dia: "Viernes", tarea: "2 mi Intervalos", detalle: "Caco 2:1 Ritmo 14:00" },
                { dia: "Sábado", tarea: "3 mi Larga", detalle: "Caco 4:1 Paso Libre" }
            ]
            // ... (resto del plan)
        };

        let currentWeek = 1;
        let activePlan = JSON.parse(localStorage.getItem('js_plan_v11')) || JSON.parse(JSON.stringify(defaultPlan));

        function loadWeek(w, ev = null) {
            currentWeek = w;
            const list = document.getElementById('training-list');
            if(!list) return;
            list.innerHTML = '';
            
            (activePlan[w] || []).forEach((item, index) => {
                const id = `w${w}d${index}`;
                const isChecked = localStorage.getItem(id) === 'true';
                list.innerHTML += `
                    <div class="bg-gray-900 p-5 rounded-2xl flex items-center justify-between border border-gray-800 transition-all ${isChecked ? 'completed' : ''}">
                        <div class="flex-1 mr-4">
                            <span class="text-[10px] text-orange-500 font-black italic uppercase">${item.dia}</span>
                            <h3 class="text-lg font-black">${item.tarea}</h3>
                            <p class="text-xs text-gray-400">${item.detalle}</p>
                        </div>
                        <input type="checkbox" onchange="toggleTask('${id}', this, event)" ${isChecked ? 'checked' : ''} class="w-6 h-6 rounded-full text-green-500 bg-black border-gray-700 cursor-pointer">
                    </div>
                `;
            });

            document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('tab-active'));
            if (ev && ev.target) ev.target.classList.add('tab-active');
            else {
                const tabs = document.querySelectorAll('.week-tab');
                if(tabs[w-1]) tabs[w-1].classList.add('tab-active');
            }
        }

        function toggleTask(id, el, e) {
            e.stopPropagation();
            localStorage.setItem(id, el.checked);
            el.parentElement.classList.toggle('completed');
        }

        function sendToCoach() {
            const notes = document.getElementById('coach-notes').value || "Sin comentarios.";
            let report = `🏃‍♀️ *REPORTE SEMANAL: JS RUNNING CLUB*\n\n*Semana:* ${currentWeek}\n*NOTAS:*\n${notes}\n\n¡Seguimos! 🔥`;
            window.open(`https://wa.me/?text=${encodeURIComponent(report)}`);
        }

        function toggleGlossary() { document.getElementById('glossary-modal').classList.toggle('hidden'); }

        // Cronómetro
        let timer, isRunning = false, seconds = 0;
        function startStop() {
            if (isRunning) clearInterval(timer);
            else timer = setInterval(() => {
                seconds++;
                let h=Math.floor(seconds/3600), m=Math.floor((seconds%3600)/60), s=seconds%60;
                document.getElementById('display').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
            isRunning = !isRunning;
            document.getElementById('startBtn').innerHTML = isRunning ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        }
        function resetTimer() { clearInterval(timer); isRunning = false; seconds = 0; document.getElementById('display').innerText = "00:00:00"; document.getElementById('startBtn').innerHTML = '<i class="fas fa-play text-white"></i>';}
        
    </script>
</body>
</html>
