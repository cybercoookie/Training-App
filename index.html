<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Running Club - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .completed { border-color: #22c55e !important; background: #064e3b; opacity: 0.7; }
        .tab-active { border-bottom: 3px solid #f97316; color: #f97316; transform: scale(1.05); }
        ::-webkit-scrollbar { display: none; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); }
        .modal-glass { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-gray-100 font-sans relative min-h-screen">

    <div id="login-view" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-sm bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl text-center">
            <h1 class="text-3xl font-black italic tracking-tighter mb-1">JS <span class="text-orange-500">RUNNING CLUB</span></h1>
            <p class="text-[10px] uppercase tracking-widest font-bold text-gray-500 mb-8">Elite Athlete Portal</p>
            
            <form id="login-form" class="space-y-4 text-left" onsubmit="handleLogin(event)">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase block mb-1 ml-1">Email del Atleta</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                        <input type="email" id="email" required class="w-full bg-black border border-gray-800 rounded-xl py-3 pl-10 pr-4 text-sm focus:border-orange-500 outline-none transition" placeholder="camila@ejemplo.com">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase block mb-1 ml-1">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                        <input type="password" id="password" required class="w-full bg-black border border-gray-800 rounded-xl py-3 pl-10 pr-4 text-sm focus:border-orange-500 outline-none transition" placeholder="••••••••">
                    </div>
                </div>
                <p id="login-error" class="text-red-500 text-xs text-center hidden font-bold mt-2"></p>
                <button type="submit" id="login-btn" class="w-full bg-orange-600 hover:bg-orange-700 p-4 rounded-xl font-black text-white shadow-lg transition active:scale-95 mt-6">
                    ENTRAR AL HUB <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="app-view" class="hidden pb-24">
        <header class="p-6 glass sticky top-0 z-40 border-b border-gray-800">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-black italic tracking-tighter">JS <span class="text-orange-500">RUNNING CLUB</span></h1>
                    <div class="flex flex-col text-[9px] uppercase tracking-widest font-bold text-gray-500 mt-1">
                        <span>Atleta: <span id="user-display-name" class="text-white">...</span></span>
                        <span>Coach: <span class="text-orange-400">J. Santiago</span></span>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="toggleGlossary()" class="bg-gray-900 p-2 rounded-lg border border-gray-800 text-blue-400 hover:text-blue-300">
                        <i class="fas fa-book"></i>
                    </button>
                    <button onclick="handleLogout()" class="bg-gray-900 p-2 rounded-lg border border-gray-800 text-red-500 hover:text-red-400">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="p-4 max-w-md mx-auto space-y-6">
            
            <div id="cloud-loading" class="text-center py-10 text-orange-500 font-bold animate-pulse hidden">
                <i class="fas fa-cloud-download-alt text-3xl mb-2"></i><br>
                Sincronizando con Supabase...
            </div>

            <div id="entrenamiento-container" class="space-y-6 hidden">
                <div class="bg-gray-900 border border-orange-500/30 p-3 rounded-xl text-center">
                    <span class="text-[10px] text-orange-500 font-bold uppercase tracking-widest">Plan Actual</span>
                    <h2 id="plan-title" class="text-white font-black italic">Cargando...</h2>
                </div>

                <div class="flex overflow-x-auto gap-6 border-b border-gray-900 pb-3 no-scrollbar">
                    <script>
                        for(let i=1; i<=8; i++) document.write(`<button onclick="loadWeek(${i}, event)" class="week-tab px-2 py-1 font-black text-xs">${i==8?'🏁':'S'+i}</button>`);
                    </script>
                </div>

                <div id="training-list" class="space-y-4"></div>

                <section class="bg-gray-900 p-6 rounded-3xl border border-gray-800 space-y-4">
                    <textarea id="coach-notes" placeholder="¿Alguna molestia o nota para el Coach?" class="w-full bg-black border border-gray-800 rounded-2xl p-4 text-sm focus:border-orange-500 outline-none h-20 transition-all"></textarea>
                    <button onclick="sendToCoach()" class="w-full bg-green-600 hover:bg-green-700 p-5 rounded-2xl font-black flex items-center justify-center gap-3 transition shadow-lg">
                        <i class="fab fa-whatsapp text-2xl"></i> ENVIAR REPORTE
                    </button>
                </section>
            </div>
        </main>
    </div>

    <div id="glossary-modal" class="hidden fixed inset-0 z-50 modal-glass flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-700 rounded-3xl p-6 max-w-sm w-full relative">
            <button onclick="toggleGlossary()" class="absolute top-4 right-4 text-gray-400"><i class="fas fa-times text-xl"></i></button>
            <h2 class="text-lg font-black text-orange-500 uppercase italic mb-4 border-b border-gray-800 pb-2"><i class="fas fa-book-open mr-2"></i> Glosario JS</h2>
            <div class="space-y-4 text-sm pr-2">
                <div><span class="font-bold text-white">Caco (X:Y):</span> <p class="text-gray-400 text-xs mt-1">Caminar-Correr.</p></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE
        const supabaseUrl = 'https://ihwzflblfeayyjuaizrx.supabase.co';
        const supabaseKey = 'sb_publishable_jRv8RmKitJkUsSRTmLto9A_nJtuQTI-';
        const supabaseClient = window.supabase ? window.supabase.createClient(supabaseUrl, supabaseKey) : null;

        let activePlanCloud = {}; 
        let currentWeek = 1;

        // AUTENTICACIÓN
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                descargarPlanDeLaNube(session.user.id);
            } else {
                document.getElementById('app-view').classList.add('hidden');
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('login-view').classList.add('flex');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('login-error');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cargando...';
            errorMsg.classList.add('hidden');

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                errorMsg.innerText = "Credenciales incorrectas.";
                errorMsg.classList.remove('hidden');
                btn.innerHTML = 'ENTRAR AL HUB <i class="fas fa-arrow-right ml-2"></i>';
            } else {
                checkSession();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            checkSession();
        }

        if(supabaseClient) {
            supabaseClient.auth.onAuthStateChange(() => checkSession());
        }

        // ==========================================
        // LA MAGIA: DESCARGAR DE LA BASE DE DATOS
        // ==========================================
        async function descargarPlanDeLaNube(userId) {
            document.getElementById('cloud-loading').classList.remove('hidden');
            document.getElementById('entrenamiento-container').classList.add('hidden');

            // 1. Obtener nombre del perfil
            const { data: perfil } = await supabaseClient.from('perfiles').select('nombre').eq('id', userId).single();
            if(perfil) document.getElementById('user-display-name').innerText = perfil.nombre;

            // 2. Buscar el plan activo del atleta
            const { data: planActivo, error: planError } = await supabaseClient
                .from('planes_entrenamiento')
                .select('id, titulo')
                .eq('atleta_id', userId)
                .eq('estado', 'activo')
                .single();

            if (planError || !planActivo) {
                document.getElementById('cloud-loading').innerHTML = "No tienes un plan activo asignado.";
                return;
            }

            document.getElementById('plan-title').innerText = planActivo.titulo;

            // 3. Traer todas las rutinas de ese plan
            const { data: rutinas } = await supabaseClient
                .from('rutinas_programadas')
                .select('*')
                .eq('plan_id', planActivo.id)
                .order('id', { ascending: true }); // Mantiene el orden de inserción

            // 4. Transformar los datos de Supabase al formato que entiende tu App web
            let planFormateado = {};
            for(let i=1; i<=8; i++) planFormateado[i] = [];

            if(rutinas) {
                rutinas.forEach(r => {
                    planFormateado[r.semana].push({
                        id_db: r.id,
                        dia: r.dia_semana,
                        tarea: r.titulo,
                        detalle: r.detalle
                    });
                });
            }

            activePlanCloud = planFormateado;
            
            document.getElementById('cloud-loading').classList.add('hidden');
            document.getElementById('entrenamiento-container').classList.remove('hidden');
            
            loadWeek(1);
        }

        // DIBUJAR LA PANTALLA
        function loadWeek(w, ev = null) {
            currentWeek = w;
            const list = document.getElementById('training-list');
            list.innerHTML = '';
            
            (activePlanCloud[w] || []).forEach((item, index) => {
                const idLocal = `w${w}d${index}`; // Temporalmente usamos LocalStorage para los checkmarks
                const isChecked = localStorage.getItem(idLocal) === 'true';
                
                list.innerHTML += `
                    <div class="bg-gray-900 p-5 rounded-2xl flex items-center justify-between border border-gray-800 transition-all ${isChecked ? 'completed' : ''}">
                        <div class="flex-1 mr-4">
                            <span class="text-[10px] text-orange-500 font-black italic uppercase">${item.dia}</span>
                            <h3 class="text-lg font-black">${item.tarea}</h3>
                            <p class="text-xs text-gray-400">${item.detalle}</p>
                        </div>
                        <input type="checkbox" onchange="toggleTask('${idLocal}', this, event)" ${isChecked ? 'checked' : ''} class="w-6 h-6 rounded-full text-green-500 bg-black border-gray-700 cursor-pointer">
                    </div>
                `;
            });

            document.getElementById('coach-notes').value = localStorage.getItem(`notes-w${w}`) || "";

            document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('tab-active'));
            const tabs = document.querySelectorAll('.week-tab');
            if (ev && ev.target) ev.target.classList.add('tab-active');
            else if (tabs[w-1]) tabs[w-1].classList.add('tab-active');
        }

        function toggleTask(id, el, e) {
            e.stopPropagation();
            localStorage.setItem(id, el.checked);
            el.parentElement.classList.toggle('completed');
        }

        function sendToCoach() {
            const notes = document.getElementById('coach-notes').value || "Sin comentarios.";
            localStorage.setItem(`notes-w${currentWeek}`, notes);
            
            let report = `🏃‍♀️ *REPORTE SEMANAL: JS RUNNING CLUB*\n\n*Semana:* ${currentWeek}\n*NOTAS:*\n${notes}\n\n¡Seguimos! 🔥`;
            window.open(`https://wa.me/?text=${encodeURIComponent(report)}`);
        }

        function toggleGlossary() { document.getElementById('glossary-modal').classList.toggle('hidden'); }
    </script>
</body>
</html>
